<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GTINコード登録</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GTIN登録">
<meta name="theme-color" content="#00b4d8">
<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

  :root {
    --bg: #f0fbff;
    --surface: #ffffff;
    --surface2: #e8f7ff;
    --accent: #00b4d8;
    --yellow: #ffe566;
    --text: #1a3a4a;
    --text2: #6a9ab0;
    --danger: #ff5c5c;
    --success: #2ec47a;
    --border: #b8e8f5;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: linear-gradient(135deg, #00b4d8, #48cae4);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,180,216,0.25);
  }

  header h1 { font-size: 17px; font-weight: 900; color: #fff; }

  #count-badge {
    background: var(--yellow);
    color: #1a3a4a;
    font-size: 12px;
    font-weight: 900;
    padding: 5px 12px;
    border-radius: 20px;
  }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  .step { display: none; }
  .step.active { display: block; }

  .card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(0,180,216,0.07);
  }
  .card.success { border-color: var(--success); background: #f0fff8; }
  .card.error { border-color: var(--danger); background: #fff5f5; }
  .card.skip { border-color: #ffb800; background: #fffdf0; }
  .card.info { background: var(--surface2); border-color: var(--accent); }

  .card-label { font-size: 11px; color: var(--text2); font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .card-value { font-size: 20px; font-weight: 800; font-family: 'Courier New', monospace; }
  .card-sub { font-size: 12px; color: var(--text2); font-weight: 600; margin-top: 3px; }

  .btn {
    display: block; width: 100%; padding: 15px;
    border-radius: 50px; border: none; font-size: 15px; font-weight: 900;
    cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.15s; margin-bottom: 8px;
  }
  .btn:last-child { margin-bottom: 0; }
  .btn-primary { background: linear-gradient(135deg, #00b4d8, #0096c7); color: #fff; box-shadow: 0 4px 14px rgba(0,180,216,0.35); }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-success { background: linear-gradient(135deg, #2ec47a, #25a366); color: #fff; box-shadow: 0 4px 14px rgba(46,196,122,0.35); }
  .btn-secondary { background: var(--surface); color: var(--accent); border: 2px solid var(--border); }
  .btn-danger { background: var(--surface); color: var(--danger); border: 2px solid #ffcdd2; }
  .btn-sm { padding: 7px 12px; font-size: 12px; width: auto; display: inline-block; margin-bottom: 0; border-radius: 20px; }

  #scanner-container {
    position: relative; border-radius: var(--radius); overflow: hidden;
    background: #000; margin-bottom: 12px; aspect-ratio: 4/3;
    box-shadow: 0 8px 32px rgba(0,180,216,0.2); display: none;
  }
  #scanner-container.active { display: block; }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; }

  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { position: absolute; inset: 20%; border: 2.5px solid rgba(0,180,216,0.8); border-radius: 12px; }
  .scan-line {
    width: 70%; height: 2.5px;
    background: linear-gradient(90deg, transparent, var(--yellow), transparent);
    box-shadow: 0 0 10px var(--yellow);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline {
    0%, 100% { transform: translateY(-60px); opacity: 0.4; }
    50% { transform: translateY(60px); opacity: 1; }
  }

  .phase-indicator { display: flex; gap: 8px; margin-bottom: 14px; }
  .phase-dot {
    flex: 1; padding: 10px; border-radius: 12px; text-align: center;
    font-size: 12px; font-weight: 800;
    background: var(--surface); border: 2px solid var(--border); color: var(--text2);
    transition: all 0.2s;
  }
  .phase-dot.active { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  .phase-dot.done { border-color: var(--success); color: var(--success); background: #f0fff8; }

  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; margin-top: 16px; }
  .history-header h3 { font-size: 15px; font-weight: 900; }

  .record-item {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .record-info { flex: 1; }
  .record-gtin { font-size: 13px; font-weight: 800; font-family: 'Courier New', monospace; }
  .record-seq { font-size: 12px; color: var(--text2); font-family: 'Courier New', monospace; margin-top: 2px; }
  .record-size { background: var(--yellow); color: #1a3a4a; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }

  .empty-state { text-align: center; color: var(--text2); padding: 24px; font-size: 13px; font-weight: 700; }

  .status-bar {
    background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
    padding: 10px 14px; font-size: 13px; color: var(--text2); margin-bottom: 12px;
    font-weight: 700; display: flex; justify-content: space-between;
  }
  .status-bar span { color: var(--accent); font-weight: 900; }

  #toast {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-16px);
    background: #fff; border: 2px solid var(--border); color: var(--text);
    padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 800;
    opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,180,216,0.15);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: #1a8a50; }
  #toast.error { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<header>
  <h1>GTINコード登録</h1>
  <span id="count-badge">0件</span>
</header>

<div class="container">

  <!-- STEP 1: 開始画面 -->
  <div class="step active" id="step-1">
    <div class="card info">
      <div class="card-label">使い方</div>
      <div style="font-size:13px; font-weight:700; line-height:1.9; color:var(--text)">
        <div>① 箱のバーコードをスキャン</div>
        <div>② 未登録なら値札をスキャン</div>
        <div>③ 自動でSupabaseに保存</div>
        <div style="font-size:12px;color:var(--text2)">JAN・UPC・EAN全て対応</div>
      </div>
    </div>

    <div class="card" id="load-status" style="background:#f0fff8; border-color: var(--success);">
      <div style="font-size:13px; font-weight:700; color: var(--text);" id="load-status-text">データを確認中...</div>
    </div>

    <button class="btn btn-primary" id="start-btn" onclick="startScan()">スキャン開始</button>
  </div>

  <!-- STEP 2: スキャン画面 -->
  <div class="step" id="step-2">

    <div class="phase-indicator">
      <div class="phase-dot active" id="phase1">1. 箱(GTIN)</div>
      <div class="phase-dot" id="phase2">2. 値札</div>
    </div>

    <!-- キャンセルボタン（カメラ起動中） -->
    <div id="btn-cancel-scan" style="display:none">
      <button class="btn btn-secondary" onclick="cancelScan()">スキャンをキャンセル</button>
    </div>

    <!-- 値札スキャン中の戻るボタン -->
    <div id="btn-back-gtin" style="display:none">
      <button class="btn btn-secondary" onclick="backToGtin()">箱からやり直す</button>
    </div>

    <div id="scanner-container">
      <video id="scanner-video"></video>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
    </div>

    <!-- GTIN結果 -->
    <div class="card" id="gtin-card" style="display:none">
      <div class="card-label">箱のバーコード (GTIN)</div>
      <div class="card-value" id="gtin-value"></div>
      <div class="card-sub" id="gtin-sub"></div>
    </div>

    <!-- 値札結果 -->
    <div class="card" id="fudai-card" style="display:none">
      <div class="card-label">値札バーコード</div>
      <div class="card-value" id="fudai-value"></div>
      <div class="card-sub" id="fudai-sub"></div>
    </div>

    <!-- アクションボタン -->
    <div id="btn-scan-gtin">
      <button class="btn btn-primary" onclick="startScanGtin()">箱のバーコードをスキャン</button>
    </div>
    <div id="btn-confirm-gtin" style="display:none">
      <button class="btn btn-success" onclick="confirmGtin()">OK → 値札をスキャンへ</button>
      <button class="btn btn-secondary" onclick="retryGtin()">やり直す</button>
    </div>
    <div id="btn-scan-fudai" style="display:none">
      <button class="btn btn-primary" onclick="startScanFudai()">値札をスキャン</button>
    </div>
    <div id="btn-confirm-fudai" style="display:none">
      <button class="btn btn-success" onclick="confirmFudai()">登録する</button>
      <button class="btn btn-secondary" onclick="retryFudai()">やり直す</button>
    </div>

    <div class="status-bar" style="margin-top:12px">
      <span>登録済み: <span id="scan-count">0</span>件</span>
      <span>スキップ: <span id="skip-count">0</span>件</span>
    </div>

    <div class="history-header">
      <h3>登録済み一覧</h3>
    </div>

    <div id="history-list">
      <div class="empty-state">まだ登録がありません</div>
    </div>

    <button class="btn btn-secondary" style="margin-top:12px" onclick="finishWork()">作業をおしまいにする</button>
    <div id="finish-actions" style="display:none; margin-top:8px">
      <button class="btn btn-danger" onclick="resetAll()">最初からやり直す</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// Supabase設定
const SUPABASE_URL = 'https://gcvnlgbscrczkodsfwxy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mJedeQsMGnKICylZKHDpmA_FHd5RByt';
const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let registeredGtins = new Set(); // 登録済みGTIN
let records = []; // 今セッションで登録したもの
let skipCount = 0;
let codeReader = null;
let scanTarget = null; // 'gtin' or 'fudai'
let pendingGtin = null;
let pendingFudai = null;

// 起動時に登録済みGTINを読み込む
window.addEventListener('DOMContentLoaded', async () => {
  const { data, error } = await dbClient.from('jancode_raw').select('gtin');
  if (error) {
    document.getElementById('load-status-text').textContent = 'データ読み込みエラー';
    return;
  }
  registeredGtins = new Set(data.map(r => r.gtin));
  document.getElementById('load-status-text').textContent = `登録済み: ${registeredGtins.size}件 読み込み完了`;

  // リアルタイム購読
  dbClient.channel('gtin-realtime')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'jancode_raw' }, payload => {
      registeredGtins.add(payload.new.gtin);
      showToast('他の端末で登録されました', '');
    })
    .subscribe();
});

function startScan() {
  document.getElementById('step-1').classList.remove('active');
  document.getElementById('step-2').classList.add('active');
}

// ===== スキャナー =====
function startScanner(target) {
  scanTarget = target;
  document.getElementById('scanner-container').classList.add('active');
  if (codeReader) { codeReader.reset(); codeReader = null; }
  codeReader = new ZXing.BrowserMultiFormatReader();
  codeReader.decodeFromConstraints(
    { video: { facingMode: 'environment' } },
    'scanner-video',
    (result, err) => {
      if (result) {
        const code = result.getText();
        stopScanner();
        if (scanTarget === 'gtin') handleGtinScan(code);
        else handleFudaiScan(code);
      }
    }
  ).catch(() => {
    showToast('カメラを起動できません', 'error');
    stopScanner();
    hideAllButtons();
    document.getElementById('btn-scan-gtin').style.display = 'block';
  });
}

function stopScanner() {
  if (codeReader) { codeReader.reset(); codeReader = null; }
  document.getElementById('scanner-container').classList.remove('active');
}

function cancelScan() {
  stopScanner();
  hideAllButtons();
  document.getElementById('btn-cancel-scan').style.display = 'none';
  document.getElementById('btn-scan-gtin').style.display = 'block';
  setPhase(1);
}

// ===== GTINフロー =====
function startScanGtin() {
  hideAllButtons();
  document.getElementById('gtin-card').style.display = 'none';
  document.getElementById('fudai-card').style.display = 'none';
  document.getElementById('btn-cancel-scan').style.display = 'block';
  setPhase(1);
  startScanner('gtin');
}

function handleGtinScan(code) {
  document.getElementById('btn-cancel-scan').style.display = 'none';

  const card = document.getElementById('gtin-card');
  card.style.display = 'block';
  document.getElementById('gtin-value').textContent = code;

  // 登録済みチェック
  if (registeredGtins.has(code)) {
    card.className = 'card skip';
    document.getElementById('gtin-sub').textContent = '登録済み → スキップ';
    soundError();
    showToast('登録済みのためスキップ', '');
    skipCount++;
    document.getElementById('skip-count').textContent = skipCount;
    hideAllButtons();
    // 1.5秒後に次へ
    setTimeout(() => {
      document.getElementById('gtin-card').style.display = 'none';
      document.getElementById('btn-scan-gtin').style.display = 'block';
      setPhase(1);
    }, 1500);
    return;
  }

  card.className = 'card success';
  document.getElementById('gtin-sub').textContent = '未登録 → 値札をスキャンしてください';
  pendingGtin = code;
  hideAllButtons();
  document.getElementById('btn-confirm-gtin').style.display = 'block';
  showToast('GTINを確認してください', '');
}

function confirmGtin() {
  hideAllButtons();
  document.getElementById('btn-scan-fudai').style.display = 'block';
  document.getElementById('btn-back-gtin').style.display = 'block';
  setPhase(2);
}

function retryGtin() {
  pendingGtin = null;
  document.getElementById('gtin-card').style.display = 'none';
  hideAllButtons();
  document.getElementById('btn-scan-gtin').style.display = 'block';
  setPhase(1);
}

function backToGtin() {
  stopScanner();
  pendingGtin = null;
  pendingFudai = null;
  document.getElementById('gtin-card').style.display = 'none';
  document.getElementById('fudai-card').style.display = 'none';
  hideAllButtons();
  document.getElementById('btn-scan-gtin').style.display = 'block';
  setPhase(1);
}

// ===== 値札フロー =====
function startScanFudai() {
  document.getElementById('btn-scan-fudai').style.display = 'none';
  document.getElementById('fudai-card').style.display = 'none';
  startScanner('fudai');
}

function handleFudaiScan(code) {
  if (code.length !== 13 || code[0] !== '6') {
    soundError();
    showToast('値札コードが正しくありません', 'error');
    document.getElementById('btn-scan-fudai').style.display = 'block';
    return;
  }

  const seqno = code.substring(1, 7);
  const edano = code.substring(7, 8);
  const sizesid = code.substring(10, 12);

  const card = document.getElementById('fudai-card');
  card.className = 'card success';
  card.style.display = 'block';
  document.getElementById('fudai-value').textContent = code;
  document.getElementById('fudai-sub').textContent = `seqno:${seqno} edano:${edano} size:${sizesid}`;

  pendingFudai = { seqno, edano, sizesid, code };
  hideAllButtons();
  document.getElementById('btn-back-gtin').style.display = 'block';
  document.getElementById('btn-confirm-fudai').style.display = 'block';
  showToast('値札を確認してください', '');
}

async function confirmFudai() {
  if (!pendingGtin || !pendingFudai) return;

  const record = {
    seqno: pendingFudai.seqno,
    edano: pendingFudai.edano,
    sizesid: pendingFudai.sizesid,
    gtin: pendingGtin
  };

  const { error } = await dbClient.from('jancode_raw').insert(record);
  if (error) {
    showToast('保存エラー: ' + error.message, 'error');
    return;
  }

  registeredGtins.add(pendingGtin);
  records.push(record);
  updateCount();
  updateHistory();
  soundOK();
  showToast('登録完了！', 'success');

  pendingGtin = null;
  pendingFudai = null;
  document.getElementById('gtin-card').style.display = 'none';
  document.getElementById('fudai-card').style.display = 'none';
  hideAllButtons();
  document.getElementById('btn-scan-gtin').style.display = 'block';
  setPhase(1);
}

function retryFudai() {
  pendingFudai = null;
  document.getElementById('fudai-card').style.display = 'none';
  document.getElementById('btn-confirm-fudai').style.display = 'none';
  document.getElementById('btn-scan-fudai').style.display = 'block';
}

// ===== ヘルパー =====
function hideAllButtons() {
  ['btn-scan-gtin','btn-confirm-gtin','btn-scan-fudai','btn-confirm-fudai','btn-back-gtin','btn-cancel-scan'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

function setPhase(n) {
  document.getElementById('phase1').className = 'phase-dot' + (n === 1 ? ' active' : ' done');
  document.getElementById('phase2').className = 'phase-dot' + (n === 2 ? ' active' : '');
}

function updateCount() {
  document.getElementById('scan-count').textContent = records.length;
  document.getElementById('count-badge').textContent = `${records.length}件`;
}

function updateHistory() {
  const el = document.getElementById('history-list');
  if (records.length === 0) { el.innerHTML = '<div class="empty-state">まだ登録がありません</div>'; return; }
  let html = '';
  [...records].reverse().forEach(r => {
    html += `<div class="record-item">
      <div class="record-info">
        <div class="record-gtin">GTIN: ${r.gtin}</div>
        <div class="record-seq">seq:${r.seqno} edano:${r.edano}</div>
      </div>
      <span class="record-size">${r.sizesid}</span>
    </div>`;
  });
  el.innerHTML = html;
}

function finishWork() {
  stopScanner();
  document.getElementById('finish-actions').style.display = 'block';
  showToast('お疲れさまでした！', 'success');
}

function resetAll() {
  if (records.length > 0 && !confirm(`${records.length}件のデータがあります。最初からやり直しますか？`)) return;
  stopScanner();
  records = []; skipCount = 0;
  pendingGtin = null; pendingFudai = null;
  updateCount();
  updateHistory();
  document.getElementById('skip-count').textContent = '0';
  document.getElementById('finish-actions').style.display = 'none';
  document.getElementById('gtin-card').style.display = 'none';
  document.getElementById('fudai-card').style.display = 'none';
  hideAllButtons();
  document.getElementById('btn-scan-gtin').style.display = 'block';
  setPhase(1);
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 2500);
}

// 音とバイブ
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration, type = 'sine') {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = type;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function soundOK() {
  beep(1000, 0.1); // 高めの短い「ピッ」
  if (navigator.vibrate) navigator.vibrate(50);
}

function soundError() {
  beep(200, 0.3, 'sawtooth'); // 低めの「ブッ」
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const w = reg.installing;
      w.addEventListener('statechange', () => {
        if (w.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
      });
    });
  });
}
</script>
</body>
</html>
