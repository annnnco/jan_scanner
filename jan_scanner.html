<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JANコード登録</title>
<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

  :root {
    --bg: #f0fbff;
    --surface: #ffffff;
    --surface2: #e8f7ff;
    --accent: #00b4d8;
    --accent2: #0096c7;
    --yellow: #ffe566;
    --text: #1a3a4a;
    --text2: #6a9ab0;
    --danger: #ff5c5c;
    --success: #2ec47a;
    --border: #b8e8f5;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: linear-gradient(135deg, #00b4d8, #48cae4);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,180,216,0.25);
  }

  header h1 { font-size: 17px; font-weight: 900; color: #fff; }

  #count-badge {
    background: var(--yellow);
    color: #1a3a4a;
    font-size: 12px;
    font-weight: 900;
    padding: 5px 12px;
    border-radius: 20px;
  }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  .step { display: none; }
  .step.active { display: block; }

  .upload-area {
    border: 2.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    margin-bottom: 14px;
    transition: all 0.2s;
  }
  .upload-area:hover { border-color: var(--accent); background: var(--surface2); }
  .upload-area .icon { font-size: 40px; margin-bottom: 10px; }
  .upload-area strong { font-size: 16px; font-weight: 900; display: block; margin-bottom: 4px; }
  .upload-area p { color: var(--text2); font-size: 13px; font-weight: 600; }
  input[type="file"] { display: none; }

  .card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(0,180,216,0.07);
  }
  .card.success { border-color: var(--success); background: #f0fff8; }
  .card.error { border-color: var(--danger); background: #fff5f5; }
  .card.skip { border-color: #ffb800; background: #fffdf0; }

  .card-label { font-size: 11px; color: var(--text2); font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .card-value { font-size: 20px; font-weight: 800; font-family: 'Courier New', monospace; }
  .card-sub { font-size: 12px; color: var(--text2); font-weight: 600; margin-top: 3px; }

  .btn {
    display: block;
    width: 100%;
    padding: 15px;
    border-radius: 50px;
    border: none;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
    margin-bottom: 8px;
  }
  .btn:last-child { margin-bottom: 0; }
  .btn-primary { background: linear-gradient(135deg, #00b4d8, #0096c7); color: #fff; box-shadow: 0 4px 14px rgba(0,180,216,0.35); }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-success { background: linear-gradient(135deg, #2ec47a, #25a366); color: #fff; box-shadow: 0 4px 14px rgba(46,196,122,0.35); }
  .btn-secondary { background: var(--surface); color: var(--accent); border: 2px solid var(--border); }
  .btn-danger { background: var(--surface); color: var(--danger); border: 2px solid #ffcdd2; }
  .btn-sm { padding: 7px 12px; font-size: 12px; width: auto; display: inline-block; margin-bottom: 0; border-radius: 20px; }

  #scanner-container {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    margin-bottom: 12px;
    aspect-ratio: 4/3;
    box-shadow: 0 8px 32px rgba(0,180,216,0.2);
    display: none;
  }
  #scanner-container.active { display: block; }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; }

  .scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .scan-frame { position: absolute; inset: 20%; border: 2.5px solid rgba(0,180,216,0.8); border-radius: 12px; }
  .scan-line {
    width: 70%; height: 2.5px;
    background: linear-gradient(90deg, transparent, var(--yellow), transparent);
    box-shadow: 0 0 10px var(--yellow);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline {
    0%, 100% { transform: translateY(-60px); opacity: 0.4; }
    50% { transform: translateY(60px); opacity: 1; }
  }

  .phase-indicator { display: flex; gap: 8px; margin-bottom: 14px; }
  .phase-dot {
    flex: 1; padding: 10px; border-radius: 12px; text-align: center;
    font-size: 12px; font-weight: 800;
    background: var(--surface); border: 2px solid var(--border); color: var(--text2);
    transition: all 0.2s;
  }
  .phase-dot.active { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  .phase-dot.done { border-color: var(--success); color: var(--success); background: #f0fff8; }

  .history-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; margin-top: 16px;
  }
  .history-header h3 { font-size: 15px; font-weight: 900; }

  .record-item {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .record-info { flex: 1; }
  .record-id { font-size: 13px; font-weight: 800; font-family: 'Courier New', monospace; }
  .record-jan { font-size: 12px; color: var(--text2); font-family: 'Courier New', monospace; margin-top: 2px; }
  .record-size { background: var(--yellow); color: #1a3a4a; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .record-actions { display: flex; gap: 6px; }

  .empty-state { text-align: center; color: var(--text2); padding: 24px; font-size: 13px; font-weight: 700; }

  .status-bar {
    background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
    padding: 10px 14px; font-size: 13px; color: var(--text2); margin-bottom: 12px;
    font-weight: 700; display: flex; justify-content: space-between;
  }
  .status-bar span { color: var(--accent); font-weight: 900; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h3 { font-size: 16px; font-weight: 900; margin-bottom: 14px; }
  .modal-label { font-size: 12px; color: var(--text2); font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }
  .modal input {
    width: 100%; background: var(--bg); border: 2px solid var(--border);
    border-radius: 10px; padding: 10px 12px; font-size: 15px;
    font-family: 'Courier New', monospace; color: var(--text); outline: none; margin-bottom: 10px;
  }
  .modal input:focus { border-color: var(--accent); }

  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #fff; border: 2px solid var(--border); color: var(--text);
    padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 800;
    opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,180,216,0.15);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: #1a8a50; }
  #toast.error { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<header>
  <h1>JANコード登録</h1>
  <span id="count-badge">0件</span>
</header>

<div class="container">

  <div class="step active" id="step-1">
    <div class="upload-area" id="upload-area">
      <div class="icon">📋</div>
      <strong>対応表ファイルを読み込む</strong>
      <p>タップしてファイルを選択</p>
    </div>
    <input type="file" id="csv-input" accept="*/*">
    <div class="card success" id="csv-status" style="display:none">
      <div class="card-label">読み込み完了</div>
      <div class="card-value" id="csv-count">-</div>
      <div class="card-sub">件のデータを読み込みました</div>
    </div>

    <div class="upload-area" id="upload-area-registered" style="margin-top:4px">
      <div class="icon">✅</div>
      <strong>登録済みJANコード（任意）</strong>
      <p>すでに登録済みの商品をスキップするCSV</p>
    </div>
    <input type="file" id="registered-csv-input" accept="*/*">
    <div class="card success" id="registered-status" style="display:none">
      <div class="card-label">登録済みCSV読み込み完了</div>
      <div class="card-value" id="registered-count">-</div>
      <div class="card-sub">件をスキップ対象に設定しました</div>
    </div>

    <button class="btn btn-primary" id="start-btn" disabled onclick="startScan()">スキャン開始</button>
  </div>

  <div class="step" id="step-2">

    <div class="phase-indicator">
      <div class="phase-dot active" id="phase1">1. 値札</div>
      <div class="phase-dot" id="phase2">2. 箱(JAN)</div>
    </div>

    <!-- カメラ起動中に表示するキャンセルボタン -->
    <div id="btn-cancel-scan" style="display:none">
      <button class="btn btn-secondary" onclick="cancelScan()">スキャンをキャンセル</button>
    </div>

    <!-- カメラ起動中に箱スキャン時の値札からやり直すボタン -->
    <div id="btn-back-fudai" style="display:none">
      <button class="btn btn-secondary" onclick="backToFudai()">値札からやり直す</button>
    </div>

    <div id="scanner-container">
      <video id="scanner-video"></video>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
    </div>

    <div class="card" id="fudai-card" style="display:none">
      <div class="card-label">値札バーコード</div>
      <div class="card-value" id="fudai-value"></div>
      <div class="card-sub" id="fudai-sub"></div>
    </div>

    <div class="card" id="jan-card" style="display:none">
      <div class="card-label">JANコード（箱）</div>
      <div class="card-value" id="jan-value"></div>
    </div>

    <div id="btn-scan-fudai">
      <button class="btn btn-primary" onclick="startScanFudai()">値札をスキャン</button>
    </div>
    <div id="btn-confirm-fudai" style="display:none">
      <button class="btn btn-success" id="btn-fudai-ok" onclick="confirmFudai()">OK → 箱をスキャンへ</button>
      <button class="btn btn-secondary" onclick="retryScanFudai()">やり直す</button>
    </div>
    <div id="btn-scan-jan" style="display:none">
      <button class="btn btn-primary" onclick="startScanJan()">箱のバーコードをスキャン</button>
    </div>
    <div id="btn-confirm-jan" style="display:none">
      <button class="btn btn-success" onclick="confirmJan()">登録する</button>
      <button class="btn btn-secondary" onclick="retryScanJan()">やり直す</button>
    </div>

    <div class="status-bar" style="margin-top:12px">
      <span>登録済み: <span id="scan-count">0</span>件</span>
      <span>未対応: <span id="error-count">0</span>件</span>
    </div>

    <div class="history-header">
      <h3>登録済み一覧</h3>
    </div>

    <div id="history-list">
      <div class="empty-state">まだ登録がありません</div>
    </div>

    <button class="btn btn-secondary" style="margin-top:12px" onclick="finishWork()">作業をおしまいにする</button>

    <div id="finish-actions" style="display:none; margin-top:8px">
      <button class="btn btn-success" onclick="downloadCSV()">データを保存する</button>
      <button class="btn btn-danger" onclick="resetAll()">最初からやり直す</button>
    </div>
  </div>

</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>登録データを編集</h3>
    <input type="hidden" id="edit-index">
    <div class="modal-label">shoesinfopriceid</div>
    <input type="text" id="edit-id" inputmode="numeric">
    <div class="modal-label">JANコード</div>
    <input type="text" id="edit-jan" inputmode="numeric">
    <button class="btn btn-primary" onclick="saveEdit()">保存する</button>
    <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<div id="toast"></div>

<script>
let masterData = {};
let registeredIds = new Set();
let records = [];
let errorCount = 0;
let codeReader = null;
let currentFudai = null;
let pendingJan = null;
let scanTarget = null;

document.getElementById('upload-area').addEventListener('click', () => document.getElementById('csv-input').click());
document.getElementById('csv-input').addEventListener('change', e => { if (e.target.files[0]) processCSV(e.target.files[0]); });
document.getElementById('upload-area-registered').addEventListener('click', () => document.getElementById('registered-csv-input').click());
document.getElementById('registered-csv-input').addEventListener('change', e => { if (e.target.files[0]) processRegisteredCSV(e.target.files[0]); });

function processRegisteredCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim());
    let count = 0;
    registeredIds = new Set();
    const header = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, '').toUpperCase());
    const idIdx = header.indexOf('SHOESINFOPRICEID');
    if (idIdx === -1) { showToast('SHOESINFOPRICEID列が見つかりません', 'error'); return; }
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length <= idIdx) continue;
      const id = cols[idIdx].trim();
      if (id) { registeredIds.add(id); count++; }
    }
    document.getElementById('registered-count').textContent = count.toLocaleString();
    document.getElementById('registered-status').style.display = 'block';
    showToast(`${count.toLocaleString()}件をスキップ設定`, 'success');
  };
  reader.readAsText(file, 'UTF-8');
}

function processCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim());
    let count = 0;
    masterData = {};
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split('\t');
      if (cols.length < 4) continue;
      const seqno = cols[0].trim().replace(/^\uFEFF/, '');
      const edano = cols[1].trim();
      const sizesid = cols[2].trim();
      const shoesinfopriceid = cols[3].trim();
      if (!seqno || !edano || !sizesid || !shoesinfopriceid) continue;
      masterData[`${seqno}-${edano}-${sizesid.padStart(2,'0')}`] = shoesinfopriceid;
      count++;
    }
    document.getElementById('csv-count').textContent = count.toLocaleString();
    document.getElementById('csv-status').style.display = 'block';
    document.getElementById('start-btn').disabled = count === 0;
    showToast(`${count.toLocaleString()}件読み込み完了`, 'success');
  };
  reader.readAsText(file, 'UTF-8');
}

function startScan() {
  document.getElementById('step-1').classList.remove('active');
  document.getElementById('step-2').classList.add('active');
}

function startScanner(target) {
  scanTarget = target;
  document.getElementById('scanner-container').classList.add('active');
  if (codeReader) { codeReader.reset(); codeReader = null; }
  codeReader = new ZXing.BrowserMultiFormatReader();
  codeReader.decodeFromConstraints(
    { video: { facingMode: 'environment' } },
    'scanner-video',
    (result, err) => {
      if (result) {
        const code = result.getText();
        stopScanner();
        if (scanTarget === 'fudai') handleFudaiScan(code);
        else handleJanScan(code);
      }
    }
  ).catch(() => { showToast('カメラを起動できません', 'error'); stopScanner(); hideAllButtons(); document.getElementById('btn-scan-fudai').style.display = 'block'; });
}

function stopScanner() {
  if (codeReader) { codeReader.reset(); codeReader = null; }
  document.getElementById('scanner-container').classList.remove('active');
}

// 値札スキャン開始
function startScanFudai() {
  hideAllButtons();
  document.getElementById('fudai-card').style.display = 'none';
  document.getElementById('jan-card').style.display = 'none';
  document.getElementById('btn-cancel-scan').style.display = 'block'; // キャンセルボタン表示
  setPhase(1);
  startScanner('fudai');
}

// 値札スキャン中キャンセル
function cancelScan() {
  stopScanner();
  hideAllButtons();
  document.getElementById('btn-scan-fudai').style.display = 'block';
}

function handleFudaiScan(code) {
  document.getElementById('btn-cancel-scan').style.display = 'none';

  if (code.length !== 13) {
    showToast(`${code.length}桁です（13桁必要）`, 'error');
    document.getElementById('btn-scan-fudai').style.display = 'block';
    return;
  }
  if (code[0] !== '6') {
    showToast('値札コードは6から始まる必要があります', 'error');
    document.getElementById('btn-scan-fudai').style.display = 'block';
    return;
  }

  const seqno = code.substring(1, 7);
  const edano = code.substring(7, 8);
  const sizesid = code.substring(10, 12);
  const key = `${seqno}-${edano}-${sizesid}`;
  const shoesinfopriceid = masterData[key];

  const card = document.getElementById('fudai-card');
  card.style.cssText = '';
  card.style.display = 'block';
  document.getElementById('fudai-value').textContent = code;

  if (!shoesinfopriceid) {
    card.className = 'card error';
    document.getElementById('fudai-sub').textContent = `対応データなし (${key})`;
    showToast('対応データが見つかりません', 'error');
    errorCount++;
    document.getElementById('error-count').textContent = errorCount;
    document.getElementById('btn-scan-fudai').style.display = 'block';
    return;
  }

  currentFudai = { seqno, edano, sizesid, shoesinfopriceid, code };

  if (registeredIds.has(String(shoesinfopriceid))) {
    card.className = 'card skip';
    document.getElementById('fudai-sub').textContent = `登録済みのためスキップ可 (ID: ${shoesinfopriceid})`;
    document.getElementById('btn-fudai-ok').textContent = 'スキップして次へ';
    document.getElementById('btn-confirm-fudai').style.display = 'block';
    showToast('登録済みの商品です', '');
    return;
  }

  card.className = 'card success';
  document.getElementById('fudai-sub').textContent = `shoesinfopriceid: ${shoesinfopriceid}`;
  document.getElementById('btn-fudai-ok').textContent = 'OK → 箱をスキャンへ';
  document.getElementById('btn-confirm-fudai').style.display = 'block';
  showToast('値札を確認してください', '');
}

function confirmFudai() {
  if (registeredIds.has(String(currentFudai.shoesinfopriceid))) {
    currentFudai = null;
    document.getElementById('fudai-card').style.display = 'none';
    hideAllButtons();
    document.getElementById('btn-scan-fudai').style.display = 'block';
    setPhase(1);
    showToast('スキップしました', '');
    return;
  }
  hideAllButtons();
  document.getElementById('btn-scan-jan').style.display = 'block';
  document.getElementById('btn-back-fudai').style.display = 'block';
  setPhase(2);
}

function retryScanFudai() {
  currentFudai = null;
  document.getElementById('fudai-card').style.display = 'none';
  hideAllButtons();
  document.getElementById('btn-scan-fudai').style.display = 'block';
  setPhase(1);
}

// 箱スキャン開始
function startScanJan() {
  document.getElementById('btn-scan-jan').style.display = 'none';
  document.getElementById('btn-confirm-jan').style.display = 'none';
  document.getElementById('jan-card').style.display = 'none';
  // btn-back-fudaiは表示したまま
  startScanner('jan');
}

function handleJanScan(code) {
  const prefix2 = code.substring(0, 2);
  if (prefix2 !== '45' && prefix2 !== '49') {
    showToast('JANコードは45か49から始まる必要があります', 'error');
    document.getElementById('btn-scan-jan').style.display = 'block';
    return;
  }

  pendingJan = code;
  const card = document.getElementById('jan-card');
  card.style.display = 'block';

  const dup = records.find(r => r.shoesinfopriceid === currentFudai.shoesinfopriceid);
  if (dup) {
    card.className = 'card error';
    document.getElementById('jan-value').textContent = code;
    showToast('既に登録済みです', 'error');
    document.getElementById('btn-scan-jan').style.display = 'block';
    return;
  }

  card.className = 'card success';
  document.getElementById('jan-value').textContent = code;
  document.getElementById('btn-scan-jan').style.display = 'none';
  document.getElementById('btn-confirm-jan').style.display = 'block';
  showToast('JANコードを確認してください', '');
}

function confirmJan() {
  if (!currentFudai || !pendingJan) return;
  records.push({ shoesinfopriceid: currentFudai.shoesinfopriceid, sizesid: currentFudai.sizesid, jancode: pendingJan });
  updateCount();
  updateHistory();
  showToast('登録完了！', 'success');
  currentFudai = null;
  pendingJan = null;
  document.getElementById('fudai-card').style.display = 'none';
  document.getElementById('jan-card').style.display = 'none';
  hideAllButtons();
  document.getElementById('btn-scan-fudai').style.display = 'block';
  setPhase(1);
}

function retryScanJan() {
  pendingJan = null;
  document.getElementById('jan-card').style.display = 'none';
  document.getElementById('btn-confirm-jan').style.display = 'none';
  document.getElementById('btn-scan-jan').style.display = 'block';
}

function backToFudai() {
  stopScanner();
  currentFudai = null; pendingJan = null;
  document.getElementById('fudai-card').style.display = 'none';
  document.getElementById('jan-card').style.display = 'none';
  hideAllButtons();
  document.getElementById('btn-scan-fudai').style.display = 'block';
  setPhase(1);
}

function hideAllButtons() {
  ['btn-scan-fudai','btn-confirm-fudai','btn-scan-jan','btn-confirm-jan','btn-back-fudai','btn-cancel-scan'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

function setPhase(n) {
  document.getElementById('phase1').className = 'phase-dot' + (n === 1 ? ' active' : ' done');
  document.getElementById('phase2').className = 'phase-dot' + (n === 2 ? ' active' : '');
}

function updateCount() {
  document.getElementById('scan-count').textContent = records.length;
  document.getElementById('count-badge').textContent = `${records.length}件`;
}

function updateHistory() {
  const el = document.getElementById('history-list');
  if (records.length === 0) { el.innerHTML = '<div class="empty-state">まだ登録がありません</div>'; return; }
  let html = '';
  [...records].reverse().forEach((r, i) => {
    const idx = records.length - 1 - i;
    html += `<div class="record-item">
      <div class="record-info">
        <div class="record-id">ID: ${r.shoesinfopriceid}</div>
        <div class="record-jan">JAN: ${r.jancode}</div>
      </div>
      <span class="record-size">${r.sizesid}</span>
      <div class="record-actions">
        <button class="btn btn-secondary btn-sm" onclick="openEdit(${idx})">編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecord(${idx})">削除</button>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function openEdit(idx) {
  const r = records[idx];
  document.getElementById('edit-index').value = idx;
  document.getElementById('edit-id').value = r.shoesinfopriceid;
  document.getElementById('edit-jan').value = r.jancode;
  document.getElementById('edit-modal').classList.add('show');
}

function saveEdit() {
  const idx = parseInt(document.getElementById('edit-index').value);
  records[idx].shoesinfopriceid = document.getElementById('edit-id').value.trim();
  records[idx].jancode = document.getElementById('edit-jan').value.trim();
  closeModal();
  updateHistory();
  showToast('編集しました', 'success');
}

function deleteRecord(idx) {
  if (!confirm('削除しますか？')) return;
  records.splice(idx, 1);
  updateCount();
  updateHistory();
  showToast('削除しました', '');
}

function closeModal() { document.getElementById('edit-modal').classList.remove('show'); }

function downloadCSV() {
  if (records.length === 0) { showToast('データがありません', 'error'); return; }
  let csv = 'shoesinfopriceid\tsizesid\tjancode\n';
  records.forEach(r => { csv += `${r.shoesinfopriceid}\t${r.sizesid}\t${r.jancode}\n`; });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/tab-separated-values' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const firstId = records[0].shoesinfopriceid;
  a.download = `jancode_${new Date().toISOString().slice(0,10)}_${firstId}.tsv`;
  a.click();
  showToast('ダウンロード完了', 'success');
}

function resetAll() {
  if (records.length > 0 && !confirm(`${records.length}件のデータが消えます。よろしいですか？`)) return;
  stopScanner();
  records = []; errorCount = 0; currentFudai = null; pendingJan = null; masterData = {};
  updateCount(); updateHistory();
  document.getElementById('csv-status').style.display = 'none';
  document.getElementById('registered-status').style.display = 'none';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('finish-actions').style.display = 'none';
  document.getElementById('step-2').classList.remove('active');
  document.getElementById('step-1').classList.add('active');
}

function finishWork() {
  stopScanner();
  document.getElementById('finish-actions').style.display = 'block';
  showToast('お疲れさまでした！', 'success');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 2500);
}
</script>
</body>
</html>
